[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is used only for stable local graph snapshot serialization; replacement is tracked for the next persistence-format revision." },
  { id = "RUSTSEC-2021-0127", reason = "serde_cbor is pulled through pgrx 0.18.0; remove the exception when pgrx removes or replaces that dependency." },
]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSL-1.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
